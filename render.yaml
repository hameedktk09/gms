services:
  - type: web
    name: gms
    runtime: node
    plan: free
    # --include=dev is required: NODE_ENV=production makes npm skip
    # devDependencies, but the build needs esbuild/tailwindcss/etc.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false   # set the real value in the Render dashboard
      - key: RESEND_API_KEY
        sync: false   # set the real value in the Render dashboard
    # Render injects PORT automatically; server.ts reads process.env.PORT.
